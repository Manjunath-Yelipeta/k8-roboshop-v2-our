apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq
    tier: db 
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: rabbitmq
    tier: db 
  ports:
  - name: rabbitmq
    protocol: TCP
    port: 5672
    targetPort: 5672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    component: rabbitmq
    tier: db 
spec:
  selector:
    project: roboshop
    component: rabbitmq
    tier: db 
  ports:
  - name: rabbitmq
    protocol: TCP
    port: 5672
    targetPort: 5672
---

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq
      tier: db 
  serviceName: "rabbitmq-headless"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
          project: roboshop
          component: rabbitmq
          tier: db 
    spec:
      containers:
      - name: rabbitmq
        image: mathslogic/rabbitmq:4.0.0
        volumeMounts:
        - name: rabbitmq
          mountPath: /var/lib/rabbitmq
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: 1Gi