apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    tier: db 
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: mongodb
    tier: db 
  ports:
  - name: mongo
    protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    component: mongodb
    tier: db 
spec:
  selector:
    project: roboshop
    component: mongodb
    tier: db 
  ports:
  - name: mongo
    protocol: TCP
    port: 27017
    targetPort: 27017
---

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db 
  serviceName: "mongodb-headless"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
          project: roboshop
          component: mongodb
          tier: db 
    spec:
      containers:
      - name: mongodb
        image: mathslogic/mongo:4.0.0
        volumeMounts:
        - name: mongodb
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: mongodb
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: 1Gi