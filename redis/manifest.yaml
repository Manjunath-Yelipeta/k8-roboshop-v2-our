apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db 
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: redis
    tier: db 
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db 
spec:
  selector:
    project: roboshop
    component: redis
    tier: db 
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379
---

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: db 
  serviceName: "redis-headless"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
          project: roboshop
          component: redis
          tier: db 
    spec:
      containers:
      - name: redis
        image: mathslogic/redis:4.0.0
        volumeMounts:
        - name: redis
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: 1Gi