apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap
  namespace: roboshop
data:
  MYSQL_ROOT_PASSWORD: RoboShop@1
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    tier: db 
spec:
  clusterIP: None
  selector:
    project: roboshop
    component: mysql
    tier: db 
  ports:
  - name: mysql
    protocol: TCP
    port: 3306
    targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    tier: db 
spec:
  selector:
    project: roboshop
    component: mysql
    tier: db 
  ports:
  - name: mysql
    protocol: TCP
    port: 3306
    targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      tier: db 
  serviceName: "mysql-headless"
  replicas: 1 # by default is 1
  template:
    metadata:
      labels:
          project: roboshop
          component: mysql
          tier: db 
    spec:
      containers:
      - name: mysql
        image: mathslogic/mysql:4.0.0
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
        envFrom:
        - configMapRef:
            name: configmap
  volumeClaimTemplates:
  - metadata:
      name: mysql
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-sc"
      resources:
        requests:
          storage: 1Gi